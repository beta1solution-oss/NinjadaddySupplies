<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#E6C200" />
    <meta name="description" content="Ninjadaddy Supplies — Direct sourcing, insane savings. Stealth shipping to US & UK." />

    <!-- PWA: manifest injected only for admin routes via JS below -->
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Ninjadaddy Supplies" />
    <meta property="og:description" content="Premium products. Stealth shipping to US & UK." />
    <meta property="og:image" content="/icon-192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
      (function(){
        if (window.emailjs) {
          emailjs.init({ publicKey: 'h7UDz0N4LIdd94R9O' });
        }
      })();
    </script>

    <title>Ninjadaddy Supplies</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Only register PWA (manifest + service worker) on admin routes
      if (window.location.pathname.startsWith('/admin')) {
        // Inject manifest link for admin pages only
        var link = document.createElement('link');
        link.rel = 'manifest';
        link.href = '/manifest.json';
        document.head.appendChild(link);
        // Register service worker
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function() {
            navigator.serviceWorker.register('/sw.js').catch(function() {});
          });
        }
      }
    </script>
  </body>
</html>
